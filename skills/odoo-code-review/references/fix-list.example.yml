# Fix-It list — copy to <repo-root>/.audit-fix-list.yml and edit.
#
# Schema reference: ~/.claude/skills/odoo-code-review/references/fix-list.md
#
# RULES (loader will fail the run if violated):
#   - id must be unique within this file (FIX-NNN)
#   - title, file, severity, owner, status are mandatory
#   - status ∈ {open, in-progress, fixed, wontfix}
#   - severity ∈ {CRITICAL, HIGH, MEDIUM, LOW, INFO}
#   - target_date / fixed_at parse as YYYY-MM-DD
#   - fingerprint (if present) matches ^[0-9a-f]{16}$
#   - at least one of fingerprint or file must be present
#   - notes is required when status is wontfix (force articulating the gap)
#
# Reconciliation (Phase 8):
#   open / in-progress + finding present       → TRACKED  (tag finding with FIX-NNN)
#   open / in-progress + finding gone          → LIKELY-FIXED (prompt owner to flip)
#   fixed              + finding present       → REGRESSION  (red banner)
#   fixed              + finding gone          → CONFIRMED-FIXED (archive after canary)
#   wontfix            + finding present       → WONTFIX (passive tag)
#   wontfix            + finding gone          → DRIFTED (recommend remove)
#
# Use the "Add to fix-it list" button in findings.html — it copies a YAML
# block with the fingerprint already filled in, so reconciliation is exact.

version: 1

